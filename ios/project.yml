name: OxidizeApp
options:
  bundleIdPrefix: com.oxidize
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  OxidizeApp:
    type: application
    platform: iOS
    sources: [OxidizeApp]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oxidize.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 3
        SWIFT_STRICT_CONCURRENCY: complete
        DEVELOPMENT_TEAM: "3SX65B95ZS"
        CODE_SIGN_STYLE: Automatic
    info:
      path: OxidizeApp/Info.plist
      properties:
        UIAppFonts:
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Bold.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDisplayName: Oxidize
        NSHealthShareUsageDescription: "Oxidize använder din kroppsvikt från Hälsa för att beräkna relativ styrka och spåra viktförändringar över tid."
        NSHealthUpdateUsageDescription: "Oxidize sparar genomförda styrketräningspass och kroppsviktsmätningar till Hälsa så att all din hälsodata samlas på ett ställe."
    entitlements:
      path: OxidizeApp/OxidizeApp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.applesignin:
          - Default
    dependencies:
      - package: Supabase
        product: Supabase
